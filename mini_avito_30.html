<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Avito PRO – 30 объявлений</title>
<style>
body{margin:0;font-family:Arial, sans-serif;background:#f3f4f6;}
header{position:sticky;top:0;z-index:1000;background:linear-gradient(135deg,#00aaff,#0077cc);color:white;padding:12px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:bold}
.search-bar{display:flex;gap:8px;flex-wrap:wrap}
.search-bar input,.search-bar select{padding:6px;border-radius:6px;border:none}
.container{max-width:1200px;margin:20px auto;padding:0 15px}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}
.controls select,.controls button{padding:6px 10px;border-radius:6px;border:1px solid #ccc;cursor:pointer}
.ads{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:15px}
.ad-card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,.08);transition:.2s;cursor:pointer;position:relative}
.ad-card:hover{transform:translateY(-4px)}
.ad-image{width:100%;height:170px;object-fit:cover}
.ad-body{padding:10px}
.price{font-weight:bold;color:#0077cc}
.location{font-size:13px;color:gray}
.favorite{position:absolute;top:8px;right:8px;background:white;border-radius:50%;padding:6px;font-size:16px;cursor:pointer}
.favorite.active{color:red}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);justify-content:center;align-items:center}
.modal-content{background:white;padding:20px;border-radius:12px;max-width:650px;width:95%;max-height:90%;overflow:auto;position:relative}
.close-btn{position:absolute;top:8px;right:12px;font-size:22px;cursor:pointer}
.chat-box{border:1px solid #ddd;height:200px;overflow-y:auto;padding:8px;margin-top:10px;border-radius:8px;background:#fafafa}
.message{margin-bottom:6px;padding:6px 10px;border-radius:8px;max-width:70%}
.me{background:#3b82f6;color:white;margin-left:auto}
.seller{background:#e5e7eb}
.chat-input{display:flex;gap:5px;margin-top:8px}
.chat-input input{flex:1;padding:6px;border-radius:6px;border:1px solid #ccc}
.chat-input button{padding:6px 10px;border:none;border-radius:6px;background:#0077cc;color:white;cursor:pointer}
@media(max-width:768px){.ads{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
<div class="logo">Mini Avito PRO</div>
<div class="search-bar">
<input type="text" id="searchInput" placeholder="Поиск...">
<select id="sortSelect">
<option value="new">Сначала новые</option>
<option value="priceAsc">Цена ↑</option>
<option value="priceDesc">Цена ↓</option>
</select>
</div>
</header>

<div class="container">
<div class="controls">
<select id="categoryFilter">
<option value="">Все категории</option>
<option>Телефоны</option>
<option>Ноутбуки</option>
<option>Авто</option>
<option>Недвижимость</option>
<option>Бытовая техника</option>
<option>Хобби</option>
</select>
<button onclick="toggleOnlyFavorites()">Избранное</button>
</div>
<div class="ads" id="adsContainer"></div>
</div>

<div class="modal" id="modal" onclick="overlayClick(event)">
<div class="modal-content">
<span class="close-btn" onclick="closeModal()">×</span>
<div id="modalBody"></div>
</div>
</div>

<script>
const ads = [];
const demoImages = [
"https://upload.wikimedia.org/wikipedia/commons/3/3a/IPhone_13_Starlight.png",
"https://upload.wikimedia.org/wikipedia/commons/9/9d/MacBook_Pro_M1_2021.png",
"https://upload.wikimedia.org/wikipedia/commons/3/32/2018_Toyota_Camry_%28ASV70R%29_Grande_sedan_%282018-10-13%29_01.jpg",
"https://upload.wikimedia.org/wikipedia/commons/8/88/Interior_of_a_living_room.jpg",
"https://upload.wikimedia.org/wikipedia/commons/2/2c/Washing_machine.jpg",
"https://upload.wikimedia.org/wikipedia/commons/4/4a/Mountain_bike.jpg"
];

const templates = [
["iPhone 13","Телефоны",45000],
["Samsung Galaxy S22","Телефоны",42000],
["iPhone 12","Телефоны",39000],
["MacBook Pro M1","Ноутбуки",120000],
["ASUS VivoBook","Ноутбуки",52000],
["Lenovo IdeaPad","Ноутбуки",48000],
["Toyota Camry 2018","Авто",1500000],
["Kia Rio 2020","Авто",980000],
["Hyundai Solaris 2019","Авто",930000],
["1‑к квартира, центр","Недвижимость",5400000],
["2‑к квартира, новостройка","Недвижимость",7200000],
["Дача с участком","Недвижимость",3100000],
["Стиральная машина LG","Бытовая техника",23000],
["Холодильник Bosch","Бытовая техника",35000],
["Пылесос Xiaomi","Бытовая техника",12000],
["Горный велосипед","Хобби",18000],
["Электросамокат","Хобби",26000],
["Гитара акустическая","Хобби",9000]
];

let idCounter=1;
while(ads.length<30){
    const t = templates[Math.floor(Math.random()*templates.length)];
    ads.push({
        id:idCounter++,
        title:t[0],
        category:t[1],
        price:t[2]+Math.floor(Math.random()*5000),
        location:["Москва","Казань","Санкт‑Петербург","Самара","Екатеринбург"][Math.floor(Math.random()*5)],
        image:demoImages[Math.floor(Math.random()*demoImages.length)],
        description:"Описание объявления. Полностью рабочий демо‑макет.",
        created:Date.now()-Math.floor(Math.random()*100000000)
    });
}

let favorites = JSON.parse(localStorage.getItem("favorites30")||"[]");
let chats = JSON.parse(localStorage.getItem("chats30")||"{}");
let onlyFavorites=false;

function saveData(){
localStorage.setItem("favorites30",JSON.stringify(favorites));
localStorage.setItem("chats30",JSON.stringify(chats));
}

function toggleOnlyFavorites(){
onlyFavorites=!onlyFavorites;
renderAds();
}

function isFav(id){return favorites.includes(id);}

function toggleFav(id){
if(isFav(id)) favorites=favorites.filter(f=>f!==id);
else favorites.push(id);
saveData();
renderAds();
}

function renderAds(){
const container=document.getElementById("adsContainer");
container.innerHTML="";

let list=[...ads];

const search=document.getElementById("searchInput").value.toLowerCase();
const cat=document.getElementById("categoryFilter").value;

if(search) list=list.filter(a=>a.title.toLowerCase().includes(search));
if(cat) list=list.filter(a=>a.category===cat);
if(onlyFavorites) list=list.filter(a=>favorites.includes(a.id));

const sort=document.getElementById("sortSelect").value;
if(sort==="priceAsc") list.sort((a,b)=>a.price-b.price);
if(sort==="priceDesc") list.sort((a,b)=>b.price-a.price);
if(sort==="new") list.sort((a,b)=>b.created-a.created);

list.forEach(ad=>{
const card=document.createElement("div");
card.className="ad-card";
card.innerHTML=`
<div class="favorite ${isFav(ad.id)?'active':''}" onclick="event.stopPropagation();toggleFav(${ad.id})">❤</div>
<img src="${ad.image}" class="ad-image" loading="lazy"
onerror="this.src='https://via.placeholder.com/600x400?text=No+Image'">
<div class="ad-body">
<h3>${ad.title}</h3>
<div class="price">${ad.price.toLocaleString()} ₽</div>
<div class="location">${ad.location}</div>
<div class="location">${ad.category}</div>
</div>`;
card.onclick=()=>openAd(ad.id);
container.appendChild(card);
});
}

function openAd(id){
const ad=ads.find(a=>a.id===id);
document.body.style.overflow="hidden";
document.getElementById("modalBody").innerHTML=`
<img src="${ad.image}" style="width:100%;border-radius:10px" loading="lazy">
<h2>${ad.title}</h2>
<p><b>Категория:</b> ${ad.category}</p>
<p><b>Цена:</b> ${ad.price.toLocaleString()} ₽</p>
<p><b>Город:</b> ${ad.location}</p>
<p>${ad.description}</p>
<button onclick="openChat(${ad.id})">Написать продавцу</button>
<div id="chatContainer"></div>`;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
document.body.style.overflow="auto";
}

function overlayClick(e){
if(e.target.id==="modal") closeModal();
}

function openChat(id){
if(!chats[id]) chats[id]=[];
document.getElementById("chatContainer").innerHTML=`
<div class="chat-box" id="chatBox"></div>
<div class="chat-input">
<input id="chatInput" placeholder="Сообщение">
<button onclick="sendMessage(${id})">Отправить</button>
</div>`;
renderChat(id);
}

function sendMessage(id){
const input=document.getElementById("chatInput");
if(!input.value) return;
chats[id].push({text:input.value,type:"me"});
setTimeout(()=>{
chats[id].push({text:"Здравствуйте! Спасибо за сообщение.",type:"seller"});
saveData();
renderChat(id);
},600);
input.value="";
saveData();
renderChat(id);
}

function renderChat(id){
const box=document.getElementById("chatBox");
box.innerHTML="";
(chats[id]||[]).forEach(m=>{
const d=document.createElement("div");
d.className="message "+m.type;
d.textContent=m.text;
box.appendChild(d);
});
box.scrollTop=box.scrollHeight;
}

document.getElementById("searchInput").addEventListener("input",renderAds);
document.getElementById("sortSelect").addEventListener("change",renderAds);
document.getElementById("categoryFilter").addEventListener("change",renderAds);

renderAds();
</script>
</body>
</html>
